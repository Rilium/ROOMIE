<style>
  :root { --bg:#0f1115; --card:#171a21; --fg:#e7e9ee; --muted:#9aa3b2; --accent:#7c5cff; --line:#262b36; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.6; max-width:980px; margin:0 auto; padding:2.5rem 1.5rem 5rem; }
  h1,h2,h3 { line-height:1.25; font-weight:700; }
  h1 { font-size:2rem; border-bottom:2px solid var(--accent); padding-bottom:.4rem; margin-top:2.5rem; }
  h2 { font-size:1.4rem; margin-top:2.2rem; border-bottom:1px solid var(--line); padding-bottom:.3rem; }
  h3 { font-size:1.12rem; margin-top:1.6rem; color:#cdd3df; }
  a { color:var(--accent); }
  table { border-collapse:collapse; width:100%; margin:1rem 0; font-size:.92rem; background:var(--card); border-radius:8px; overflow:hidden; }
  th,td { border:1px solid var(--line); padding:.5rem .7rem; text-align:left; vertical-align:top; }
  th { background:#1f2430; color:#fff; font-weight:600; }
  code { background:#1f2430; padding:.12rem .4rem; border-radius:4px; font-size:.88em; }
  pre { background:#11141b; border:1px solid var(--line); border-radius:8px; padding:1rem; overflow:auto; }
  pre code { background:none; padding:0; }
  blockquote { border-left:3px solid var(--accent); margin:1rem 0; padding:.4rem 1rem; background:rgba(124,92,255,.08); color:var(--muted); border-radius:0 6px 6px 0; }
  hr { border:none; border-top:1px solid var(--line); margin:2.5rem 0; }
  #TOC { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:1rem 1.4rem; margin:2rem 0; }
  #TOC ul { margin:.2rem 0; }
  .title { font-size:2.4rem; }
  .subtitle { color:var(--muted); font-weight:400; }
</style>
